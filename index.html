      (rows || '<div style="color:var(--text2);font-size:14px;text-align:center;padding:20px 0">Geen trainingen beschikbaar</div>') +
    '</div>';
};

window.confirmCombine = function(woId, firstDbId, secondDbId) {
  const wo = STATE.weeks.flatMap(wk=>wk.workouts).find(w=>w.id===woId);
  const wk = STATE.weeks.find(wk=>wk.workouts.some(w=>w.id===woId));
  if (!wo || !wk) return;
  const first  = WORKOUT_DB.find(w => w.id === firstDbId);
  const second = WORKOUT_DB.find(w => w.id === secondDbId);
  if (!first || !second) return;
  const wi = wk.weekNumber - 1;
  const s = STATE.setup;
  const prog = wi / Math.max(STATE.weeks.length-1,1);
  const cp = s.currentPaceSec || s.targetPaceSec;
  const bp = wi >= STATE.weeks.length-2 ? s.targetPaceSec : Math.round(cp + (s.targetPaceSec-cp)*Math.min(prog/0.85,1.0));

  const blocks1 = first.buildBlocks(bp, wo.km);
  const blocks2 = second.buildBlocks(bp, wo.km);

  // Remove duplicate warming-up/cooling-down at the join point
  // Strip last cooling-down of first and first warming-up of second
  const b1 = blocks1.filter((b,i) => !(i === blocks1.length-1 && b.label === 'Cooling-down'));
  const b2 = blocks2.filter((b,i) => !(i === 0 && b.label === 'Warming-up'));

  // Add a short separator block between the two workouts
  const separator = {label:'Transitie',km:0.3,pace:Math.round(bp*1.40),zone:'Z1',zoneName:'Herstel',color:'#94a3b8'};
  const combined = [...b1, separator, ...b2];

  const totalKm  = Math.round(combined.reduce((s,b)=>s+b.km,0)*10)/10;
  const totalMin = Math.round(combined.reduce((s,b)=>s+(b.km*b.pace/60),0));
  const combinedName = first.name + ' + ' + second.name;
  const combinedTSS  = Math.round((first.tss + second.tss) * 0.75);

  updateWo(woId, {
    workoutId: firstDbId + '+' + secondDbId,
    workoutName: combinedName,
    blocks: combined,
    km: totalKm,
    min: totalMin,
    combined: true,
    combinedFrom: [firstDbId, secondDbId],
  });
  openSheet(woId);
};

window.swapWorkout = function(woId, newDbId) {
  const wo = STATE.weeks.flatMap(wk=>wk.workouts).find(w=>w.id===woId);
  const wk = STATE.weeks.find(wk=>wk.workouts.some(w=>w.id===woId));
  if (!wo || !wk) return;
  const dbWo = WORKOUT_DB.find(w=>w.id===newDbId);
  if (!dbWo) return;
  const wi = wk.weekNumber - 1;
  const s = STATE.setup;
  const prog = wi / Math.max(STATE.weeks.length-1,1);
  const cp = s.currentPaceSec || s.targetPaceSec;
  const bp = wi >= STATE.weeks.length-2 ? s.targetPaceSec : Math.round(cp + (s.targetPaceSec-cp)*Math.min(prog/0.85,1.0));
  const nb = dbWo.buildBlocks(bp, wo.km);
  const nk = Math.round(nb.reduce((s,b)=>s+b.km,0)*10)/10;
  const nm = Math.round(nb.reduce((s,b)=>s+(b.km*b.pace/60),0));
  updateWo(woId, {workoutId:newDbId, workoutName:dbWo.name, blocks:nb, km:nk, min:nm});
  openSheet(woId);
};

window.closeSheet = () => {
  document.getElementById('sheet-overlay').style.display = 'none';
  STATE.sheet = null;
  renderSchemaTab();
};
window.sheetMode = m => { STATE.sheet.mode = m; renderSheet(); };
window.sheetRPEChange = v => { STATE.sheet.rpe = parseFloat(v); renderSheet(); };
window.sheetKmChange  = v => { STATE.sheet.km  = parseFloat(v); };
window.sheetMinChange = v => { STATE.sheet.min = parseInt(v); };

window.saveLog = () => {
  const { id, rpe, km, min, paceOverrides, loggedPaces } = STATE.sheet;
  updateWo(id, {
    done: true, missed: false,
    loggedRPE: rpe, loggedKm: km, loggedMin: min,
    paceOverrides: Object.keys(paceOverrides||{}).length ? paceOverrides : undefined,
    loggedPaces:   Object.keys(loggedPaces||{}).length   ? loggedPaces   : undefined,
  });
  closeSheet();
};
window.missWo   = id => { updateWo(id, { missed:true, done:false, loggedRPE:null }); closeSheet(); };
window.unmissWo = id => { updateWo(id, { missed:false }); closeSheet(); };
window.undoLog  = id => { updateWo(id, { done:false, loggedRPE:null, loggedKm:null, loggedMin:null, adapted:false, adaptNote:null }); closeSheet(); };

function updateWo(id, patch) {
  STATE.weeks = STATE.weeks.map(wk => ({
    ...wk, workouts: wk.workouts.map(wo => wo.id===id ? {...wo,...patch} : wo)
  }));
  const { weeks, acwr, warnings } = applyAdaptations(STATE.weeks, STATE.setup);
  STATE.weeks = weeks; STATE.acwr = acwr; STATE.warnings = warnings || [];
  persistState();
}

// Register service worker for PWA install prompt
// ── PWA: generate icon + inject manifest ──
(function injectPWA() {
  // Draw app icon on canvas → PNG data URI (works on iOS Safari + Android Chrome)
  function makeIcon(size) {
    try {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      // Background
      const r = size * 0.175;
      ctx.fillStyle = '#0a0a12';
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size-r);
      ctx.quadraticCurveTo(size, size, size-r, size);
      ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
      ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.fill();
      // Text
      ctx.fillStyle = '#16a34a';
      ctx.font = 'bold ' + Math.round(size * 0.52) + 'px Arial Black, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('R2', size * 0.5, size * 0.54);
      return c.toDataURL('image/png');
    } catch(e) { return ''; }
  }

  const icon512 = makeIcon(512);
  const icon192 = makeIcon(192);
  const icon180 = makeIcon(180);

  // Set apple-touch-icon (critical for iOS "Add to Home Screen")
  const touchIcon = document.getElementById('pwa-touch-icon');
  if (touchIcon && icon180) touchIcon.href = icon180;

  // Inject Web App Manifest (for Android Chrome install banner)
  const manifest = {
    name: 'RUN2 — Adaptief Loopschema',
    short_name: 'RUN2',
    description: 'Persoonlijk adaptief hardloopschema',
    start_url: location.href.split('?')[0],
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0a0a12',
    theme_color: '#0a0a12',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
    const link = document.getElementById('pwa-manifest');
    if (link) link.href = URL.createObjectURL(blob);
  } catch(e) {}
})();

// ── Service Worker (scope fix for hosted single-file) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      const CACHE = 'run2-v2';
      const OFFLINE_URLS = [location.href];
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.add(self.location.href)).catch(()=>{})
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        if (e.request.mode === 'navigate') {
          e.respondWith(
            fetch(e.request).catch(() => caches.match(e.request))
          );
        }
      });
    `;
    try {
      const blob  = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    } catch(e) {}
  });
}

// Android install prompt
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Show install banner after 2s if not already installed
  setTimeout(() => {
    if (!window.matchMedia('(display-mode: standalone)').matches && _installPrompt) {
      const banner = document.createElement('div');
      banner.id = 'install-banner';
      banner.style.cssText = 'position:fixed;bottom:80px;left:12px;right:12px;z-index:9999;background:#ffffff;border:1px solid rgba(22,163,74,.35);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6)';
      banner.innerHTML = `
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:#0a0a12;margin-bottom:2px">📲 Installeer RUN2</div>
          <div style="font-size:12px;color:rgba(0,0,0,.52)">Voeg toe aan je beginscherm</div>
        </div>
        <button id="install-btn" style="padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,#16a34a,#22c55e);border:none;color:#080810;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap">Installeer</button>
        <button id="install-dismiss" style="background:none;border:none;color:rgba(0,0,0,.45);font-size:18px;cursor:pointer;padding:4px">✕</button>
      `;
      document.body.appendChild(banner);
      document.getElementById('install-btn').onclick = () => {
        _installPrompt.prompt();
        _installPrompt.userChoice.then(() => { banner.remove(); _installPrompt = null; });
      };
      document.getElementById('install-dismiss').onclick = () => banner.remove();
    }
  }, 2000);
});

if (loadPersistedState()) {
  renderApp();
} else {
